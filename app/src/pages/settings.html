<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - Student Success Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
            <div class="sidebar">
        <div class="sidebar-header">🎓 Success Hub</div>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="semesters.html">📅 Semesters</a></li>
            <li><a href="courses.html">📚 Courses</a></li>
            <li><a href="calculator.html">🧮 GPA Calculator</a></li>
            <li><a href="simulator.html">🎯 Goal Simulator</a></li>
            <li><a href="mark_scaling.html">📈 Mark Scaling</a></li>
            <li><a href="transcript.html">📜 Transcript</a></li>
            <li><a href="settings.html" class="active">👤 Profile Settings</a></li>
            <li class="mt-auto"><a href="#" id="logoutBtn" style="color: #f87171;">🚪 Logout</a></li>
        </ul>
    </div>

    <button id="mobile-toggle" class="mobile-toggle" aria-label="Toggle Menu">
        ☰
    </button>

    <div class="main-content">
        <div class="mb-4">
            <h2 class="fw-bold">Profile Settings</h2>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="custom-card">
                    <h5 class="fw-bold mb-3">Account Information</h5>
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="username-field" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="fullname-field" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">University Email</label>
                            <input type="email" id="email-field" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Account Info</button>
                    </form>
                </div>
                
                <div class="custom-card mt-4">
                    <h5 class="fw-bold mb-3">Security</h5>
                    <form id="passwordForm">
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" id="new-password-field" class="form-control" placeholder="Enter new password">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Confirm New Password</label>
                            <input type="password" id="confirm-password-field" class="form-control" placeholder="Repeat new password">
                        </div>
                        <button type="submit" class="btn btn-outline-primary w-100">Update Password</button>
                    </form>
                </div>
            </div>
            <div class="col-md-6">
                <div class="custom-card">
                    <h5 class="fw-bold mb-3">Appearance</h5>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="themeToggle">
                        <label class="form-check-label" for="themeToggle">Dark Mode</label>
                    </div>
                </div>
                <div class="custom-card mt-4">
                    <h5 class="fw-bold mb-3">AI Configuration</h5>
                    <div class="mb-3">
                        <label class="form-label">Gemini API Key</label>
                        <input type="password" id="aiApiKey" class="form-control" placeholder="Enter your key">
                        <div class="form-text">Your key is stored locally in your browser.</div>
                    </div>
                    <button id="saveAiKey" class="btn btn-outline-primary w-100">Save API Key</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/ui.js"></script>
    <script src="../scripts/api.js" type="module"></script>
    <script src="../scripts/settings.js" type="module"></script>
    <script src="../scripts/theme.js"></script>
</body>
</html>
