<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Transcript</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/transcript.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark px-4">
        <a class="navbar-brand" href="#">📖 Academic Tracker</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="calculator.html">GPA Calculator</a></li>
                <li class="nav-item"><a class="nav-link active" href="transcript.html">Transcript</a></li>
                <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
                <li class="nav-item ms-lg-3">
                    <span class="text-light me-3" id="user-welcome">Welcome, Guest</span>
                </li>
                <li class="nav-item"><button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button></li>
            </ul>
        </div>
    </nav>

    <div class="container py-4">
        <!-- Page Header -->
        <div class="d-flex align-items-center mb-4">
            <a href="dashboard.html" class="back-btn me-3">←</a>
            <div>
                <h2 class="page-title mb-0">📄 Academic Transcript</h2>
                <p class="page-subtitle mb-0">Full academic record across all semesters.</p>
            </div>
            <button class="btn btn-print ms-auto" onclick="window.print()">🖨️ Print</button>
        </div>

        <!-- Student Summary Card -->
        <div class="summary-card mb-4">
            <div class="d-flex justify-content-between align-items-start">
                <div>
                    <h4 class="student-name" id="student-name">student-name</h4>
                    <p class="student-meta mb-1">Username: <span id="student-username">@username</span></p>
                    <p class="student-meta mb-0">Generated: <span id="generated-date"></span></p>
                </div>
                <div class="text-end">
                    <div class="cgpa-big" id="cgpa-display">3.14</div>
                    <div class="cgpa-label">CUMULATIVE GPA</div>
                    <div class="standing-text" id="standing-display">Good</div>
                </div>
            </div>
            <hr class="divider">
            <div class="row text-center">
                <div class="col-4">
                    <div class="stat-number" id="total-semesters">0</div>
                    <div class="stat-label">SEMESTERS</div>
                </div>
                <div class="col-4">
                    <div class="stat-number" id="total-courses">0</div>
                    <div class="stat-label">COURSES</div>
                </div>
                <div class="col-4">
                    <div class="stat-number" id="total-credits">0</div>
                    <div class="stat-label">CREDITS</div>
                </div>
            </div>
        </div>

        <!-- Semesters -->
        <div id="semesters-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/auth.js"></script>
    <script src="../scripts/transcript.js"></script>
</body>
</html>
