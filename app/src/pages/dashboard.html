<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <!-- Main Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark px-4 mb-4">
        <a class="navbar-brand" href="#">🎓 GPA Tracker</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="calculator.html">GPA Calculator</a></li>
                <li class="nav-item"><a class="nav-link" href="transcript.html">Transcript</a></li>
                <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
                <!-- User Name Display -->
                <li class="nav-item ms-lg-3">
                    <span class="text-light me-3" id="user-welcome">Welcome, Guest</span>
                </li>
                <li class="nav-item"><button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="row text-center mb-5">
            <div class="col-md-6">
                <div class="card p-3 bg-white">
                    <h5>Overall CGPA</h5>
                    <h2 id="cgpa-value" class="text-primary">0.00</h2>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3 bg-white">
                    <h5>Total Credits Earned</h5>
                    <h2 id="total-credits" class="text-secondary">0</h2>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4>My Semesters</h4>
            <!-- Button to add a new semester -->
            <button class="btn btn-success btn-sm" onclick="addSemester()">+ Add Semester</button>
        </div>
        
        <div id="semester-container" class="row g-4"></div>
    </div>

    <!-- SEMESTER DETAILS MODAL -->
    <!-- This is a hidden window that pops up when you click 'View Details' -->
    <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Semester Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul id="course-list" class="list-group list-group-flush">
                        <!-- Courses will be injected here by JS -->
                    </ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/dashboard.js"></script>
</body>
</html>
