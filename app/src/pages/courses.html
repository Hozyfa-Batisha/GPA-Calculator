<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>All Courses - Student Success Hub</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-header">🎓 Success Hub</div>
      <ul class="sidebar-menu">
        <li><a href="dashboard.html">📊 Dashboard</a></li>
        <li><a href="semesters.html">📅 Semesters</a></li>
        <li><a href="courses.html" class="active">📚 Courses</a></li>
        <li><a href="calculator.html">🧮 GPA Calculator</a></li>
        <li><a href="simulator.html">🎯 Goal Simulator</a></li>
        <li><a href="mark_scaling.html">📈 Mark Scaling</a></li>
        <li><a href="transcript.html">📜 Transcript</a></li>
        <li><a href="settings.html">👤 Profile Settings</a></li>
        <li class="mt-auto">
          <a href="#" id="logoutBtn" style="color: #f87171">🚪 Logout</a>
        </li>
      </ul>
    </div>

    <div class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">All Courses</h2>
        <button id="addCourseBtn" class="btn btn-primary">
          + Add New Course
        </button>
      </div>

      <div class="row mb-4">
        <div class="col-md-4">
          <div class="d-flex gap-2">
            <input
              type="text"
              id="searchBox"
              class="form-control"
              placeholder="Search courses..."
            />
            <button id="searchBtn" class="btn btn-outline-primary">
              Search
            </button>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-12">
          <div class="custom-card">
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>Course Name</th>
                    <th>Semester</th>
                    <th>Grade</th>
                    <th>Credits</th>
                    <th class="text-end">Actions</th>
                  </tr>
                </thead>
                <tbody id="course-list">
                  <!-- Injected by JS -->
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/ui.js"></script>
    <script src="../scripts/api.js" type="module"></script>
    <script type="module">
      import { api } from "../scripts/api.js";

      async function loadCourses(searchTerm = "") {
        try {
          // Since the API currently requires a semester_id, we'll fetch all semesters first
          const semesters = await api.semesters.getAll();
          let allCourses = [];

          for (const sem of semesters) {
            const courses = await api.courses.getBySemester(sem.id);
            const coursesWithSemName = courses.map((c) => ({
              ...c,
              semester_name: sem.name,
            }));
            allCourses = [...allCourses, ...coursesWithSemName];
          }

          const list = document.getElementById("course-list");
          list.innerHTML = "";

          const filtered = allCourses.filter((c) =>
            c.name.toLowerCase().includes(searchTerm.toLowerCase()),
          );

          filtered.forEach((c) => {
            list.innerHTML += `
                        <tr>
                            <td class="fw-bold">${c.name}</td>
                            <td>${c.semester_name}</td>
                            <td><span class="badge bg-primary">${c.grade || "N/A"}</span></td>
                            <td>${c.credits}</td>
                            <td class="text-end">
                                <a href="course_manage.html?id=${c.id}" class="btn btn-sm btn-outline-secondary">Edit</a>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteCourse(${c.id})">Delete</button>
                            </td>
                        </tr>
                    `;
          });
        } catch (err) {
          window.location.href = "login.html";
        }
      }

      window.deleteCourse = async (id) => {
        if (confirm("Delete this course?")) {
          try {
            await api.courses.delete(id);
            loadCourses();
          } catch (err) {
            alert(err.message);
          }
        }
      };

      document.getElementById("addCourseBtn").onclick = () => {
        window.location.href = "course_manage.html";
      };

      document.getElementById("searchBtn").onclick = () => {
        const term = document.getElementById("searchBox").value;
        loadCourses(term);
      };

      window.onload = () => loadCourses();
    </script>
    <script src="../scripts/theme.js"></script>
  </body>
</html>
