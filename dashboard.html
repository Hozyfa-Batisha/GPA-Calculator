<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPA Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Main Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark px-4 mb-4">
        <a class="navbar-brand" href="#">🎓 GPA Tracker</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="calculator.html">GPA Calculator</a></li>
                <li class="nav-item"><a class="nav-link" href="transcript.html">Transcript</a></li>
                <li class="nav-item"><a class="nav-link" href="settings.html">Settings</a></li>
                <li class="nav-item ms-lg-3"><button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="row text-center mb-5">
            <div class="col-md-6">
                <div class="card p-3 bg-white">
                    <h5>Overall CGPA</h5>
                    <h2 id="cgpa-value" class="text-primary">0.00</h2>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card p-3 bg-white">
                    <h5>Total Credits Earned</h5>
                    <h2 id="total-credits" class="text-secondary">0</h2>
                </div>
            </div>
        </div>
        <h4 class="mb-3">My Semesters</h4>
        <div id="semester-container" class="row g-4"></div>
    </div>

    <!-- Bootstrap JS Bundle (needed for the navbar toggle to work on mobile) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
